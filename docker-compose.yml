services:
  app:
    build: .
    container_name: flowchart_ai_app
    ports:
      - "8050:8080"
    volumes:
      - .:/app
      - /app/.venv  # Correcto: evita colisión de venv
    environment:
      - ENVIRONMENT=development
      - PYTHONPATH=/app  # Esto es vital
      - UV_LINK_MODE=copy # Evita el error de hardlink en Docker